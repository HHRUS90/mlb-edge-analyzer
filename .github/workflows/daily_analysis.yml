name: MLB Daily Analysis

on:
  schedule:
    # Runs at 10:30 AM UTC (which is 6:30 AM ET)
    # This ensures you have the morning report before the first games start
    - cron: '30 10 * * *'
  workflow_dispatch: # Allows you to trigger the bot manually for testing

permissions:
  contents: write # Essential for the bot to save and push the CSV profit ledger

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install pandas requests mlb-statsapi pybaseball

      - name: Run MLB Quant Script
        env:
          # Connecting your GitHub Secrets to the Python Environment
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main.py

      - name: Commit and Push Prediction Ledger
        run: |
          # Configure the virtual bot user
          git config --local user.email "action@github.com"
          git config --local user.name "MLB-Quant-Bot"
          
          # Add the ledger file (it will create it if it's the first run)
          git add prediction_history.csv
          
          # Only commit if there are actually changes to the file
          git commit -m "Update MLB results and log today's picks [skip ci]" || echo "No changes to commit"
          
          # Push the updated CSV back to your repository
          git push
