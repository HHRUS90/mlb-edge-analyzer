name: MLB Pro Analyzer

on:
  schedule:
    - cron: '0 14,18,21 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Explicitly grant write access
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get full history for cleaner pushes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Restore Data & BvP Cache
        uses: actions/cache@v4
        with:
          path: |
            bvp_cache.json
            prediction_history.csv
            api_usage.csv
          # Stable key to prevent run_id mismatch
          key: mlb-data-cache-v5-${{ runner.os }}
          restore-keys: |
            mlb-data-cache-v5-${{ runner.os }}-

      - name: Install Dependencies
        run: pip install pandas requests MLB-StatsAPI pytz

      - name: Run MLB Analysis
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main.py

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git pull origin main # Ensure local is sync'd before pushing
          git add prediction_history.csv api_usage.csv bvp_cache.json evaluation_log.txt
          git diff-index --quiet HEAD || git commit -m "Automated Data Update [$(date)]"
          git push origin main
