name: MLB Pro Analyzer

on:
  # Triggered instantly via external API requests (e.g., cron-job.org)
  repository_dispatch:
    types: [cron_hourly_trigger]
  # Allows you to still run it manually via the GitHub UI for troubleshooting
  workflow_dispatch:
    inputs:
      force_telegram:
        description: 'Force Telegram Report Delivery'
        required: false
        default: 'false'
        type: boolean

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Explicitly grant write access
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get full history for cleaner pushes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Restore Data & BvP Cache
        uses: actions/cache@v4
        with:
          path: |
            bvp_cache.json
            prediction_history.csv
            api_usage.csv
          key: mlb-data-cache-v2-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            mlb-data-cache-v2-${{ runner.os }}-

      - name: Install Dependencies
        run: pip install pandas requests MLB-StatsAPI pytz

      - name: Determine Run Mode
        id: run_mode
        run: |
          # Calculate current hour in America/Denver 
          DENVER_HOUR=$(TZ="America/Denver" date +%H)
          echo "Current Denver hour: $DENVER_HOUR"
          
          # Send report only during the 9 AM, 11 PM, and 3 PM Denver windows, 
          # OR if forced manually via workflow_dispatch.
          if [ "$DENVER_HOUR" = "09" ] || [ "$DENVER_HOUR" = "11" ] || [ "$DENVER_HOUR" = "15" ] || [ "${{ github.event.inputs.force_telegram }}" = "true" ]; then
            echo "ARGS=--send-report" >> $GITHUB_OUTPUT
            echo "Report delivery armed."
          else
            echo "ARGS=" >> $GITHUB_OUTPUT
            echo "Silent data collection armed."
          fi

      - name: Run MLB Analysis
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main.py ${{ steps.run_mode.outputs.ARGS }}

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          [ -f prediction_history.csv ] && git add prediction_history.csv
          [ -f api_usage.csv ] && git add api_usage.csv
          [ -f bvp_cache.json ] && git add bvp_cache.json
          [ -f evaluation_log.txt ] && git add evaluation_log.txt
          git diff-index --quiet HEAD || git commit -m "Automated Data Update [$(date)]"
          git push
