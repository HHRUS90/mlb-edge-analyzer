name: MLB Daily Analysis

on:
  schedule:
    # Runs at 10:30 AM UTC (6:30 AM ET)
    - cron: '30 10 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write 

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install pandas requests mlb-statsapi pybaseball

      - name: Run MLB Quant Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main.py

      - name: Commit and Push Prediction Ledger and Usage Log
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MLB-Quant-Bot"
          
          # This 'if' logic checks if the files exist before trying to add them
          if [ -f prediction_history.csv ]; then git add prediction_history.csv; fi
          if [ -f api_usage.csv ]; then git add api_usage.csv; fi
          
          # Only commit if there are actual changes staged
          git commit -m "Update MLB results, picks, and local API ticker [skip ci]" || echo "No changes to commit"
          
          git push
