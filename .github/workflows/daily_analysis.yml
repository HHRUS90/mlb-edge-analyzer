name: MLB Daily Analysis

on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install pandas requests mlb-statsapi pybaseball

      - name: Run MLB Quant Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main.py

      - name: Commit and Push Prediction Ledger and Usage Log
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MLB-Quant-Bot"
          git add prediction_history.csv api_usage.csv
          git commit -m "Update MLB results, picks, and local API ticker [skip ci]" || echo "No changes to commit"
          git push
