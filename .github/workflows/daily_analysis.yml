name: MLB Daily Pro Analysis

on:
  schedule:
    # 14 = 8:00 AM MDT
    # 18 = 12:00 PM MDT
    # 21 = 3:00 PM MDT
    - cron: '0 14,18,21 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Restore Data & BvP Cache
        uses: actions/cache@v4
        with:
          path: |
            bvp_cache.json
            prediction_history.csv
            api_usage.csv
          # The key ensures the cache is unique to the day but restored across hours
          key: mlb-data-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            mlb-data-cache-${{ runner.os }}-

      - name: Install Dependencies
        run: |
          pip install pandas requests pytz MLB-StatsAPI

      - name: Run MLB Analysis
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main.py

      - name: Commit and Push Updated Data
        # This step ensures the CSVs and JSON are saved back to your repo
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add prediction_history.csv api_usage.csv bvp_cache.json evaluation_log.txt
          git commit -m "Automated Data Update [$(date)]" || exit 0
          git push
