name: MLB Pro Analyzer

on:
  schedule:
    # 14 UTC = 8:00 AM MDT
    # 18 UTC = 12:00 PM MDT
    # 21 UTC = 3:00 PM MDT
    - cron: '0 14,18,21 * * *'
  workflow_dispatch:      # Allows you to run it manually from the "Actions" tab whenever you want

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Restore Data & BvP Cache
        uses: actions/cache@v4
        with:
          path: |
            bvp_cache.json
            prediction_history.csv
            api_usage.csv
          key: mlb-data-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            mlb-data-cache-${{ runner.os }}-

      - name: Install Dependencies
        run: |
          pip install pandas requests miracle-statsapi pytz

      - name: Run MLB Analysis
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main.py

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Only add files if they exist to prevent "pathspec" errors on first run
          [ -f prediction_history.csv ] && git add prediction_history.csv
          [ -f api_usage.csv ] && git add api_usage.csv
          [ -f bvp_cache.json ] && git add bvp_cache.json
          [ -f evaluation_log.txt ] && git add evaluation_log.txt
          
          # Only commit if there are actually changes to record
          git diff-index --quiet HEAD || git commit -m "Automated Data Update [$(date)]"
          git push
