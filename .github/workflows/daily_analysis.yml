name: MLB Daily Pro Analysis

on:
  schedule:
    - cron: '0 14 * * *'  # 8:00 AM MST
    - cron: '0 17 * * *'  # 11:00 AM MST
    - cron: '0 21 * * *'  # 3:00 PM MST
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install MLB-StatsAPI pandas requests pybaseball pytz

      - name: Restore Pitcher Cache
        uses: actions/cache@v3
        with:
          path: pitcher_cache
          key: ${{ runner.os }}-pitcher-data-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-pitcher-data-

      - name: Run MLB Analysis
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main.py

      - name: Commit and Push Prediction History
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add prediction_history.csv api_usage.csv
          git commit -m "Update MLB Predictions and Usage [skip ci]" || echo "No changes to commit"
          git push
