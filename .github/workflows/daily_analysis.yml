name: MLB Quant Report

on:
  schedule:
    # Runs at exactly 8:00 AM Mountain Time (MDT/MST) every day
    - cron: '0 8 * * *'
      timezone: "America/Denver"
  workflow_dispatch: # Allows you to run it manually for testing

permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install mlb-statsapi pandas requests pybaseball pytz

      - name: Run MLB Analysis
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add prediction_history.csv api_usage.csv
          git commit -m "Update prediction history [skip ci]" || echo "No changes to commit"
          git push
