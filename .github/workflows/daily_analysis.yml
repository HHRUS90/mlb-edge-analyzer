name: MLB Daily Analysis

on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:

# We need this permission block to allow GitHub to push the CSV to the repo
permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install pandas requests mlb-statsapi pybaseball

      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and Push Prediction Log
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add prediction_history.csv
          # The '|| true' prevents the workflow from crashing if no new games were added
          git commit -m "Auto-update prediction history" || true
          git push
